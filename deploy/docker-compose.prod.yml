services:
  app:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      EMAILDASH_PUBLIC_BASE_URL: https://emaildash.purya.dev
      EMAILDASH_ALLOWED_ORIGIN: https://emaildash.purya.dev
      EMAILDASH_DATA_DIR: /data
      EMAILDASH_WORKER_BUNDLE: /app/worker/dist/index.js
    volumes:
      - ../../data:/data
