services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      EMAILDASH_ALLOWED_ORIGIN: http://localhost:5173
      EMAILDASH_PUBLIC_BASE_URL: http://localhost:8080
      EMAILDASH_DATA_DIR: /data
    volumes:
      - ../data:/data
  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    environment:
      CHOKIDAR_USEPOLLING: "true"
  worker:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run build"
    volumes:
      - ../worker:/app
