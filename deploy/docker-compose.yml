services:
  app:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      EMAILDASH_ALLOWED_ORIGIN: http://localhost:8080
      EMAILDASH_PUBLIC_BASE_URL: http://localhost:8080
      EMAILDASH_DATA_DIR: /data
    volumes:
      - ../data:/data
